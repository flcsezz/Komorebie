<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Komorebie | Digital Zen Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Manrope:wght@200;300;400;500&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-950">
    <div id="root">
      <style>
        body, html {
          margin: 0;
          padding: 0;
          height: 100%;
          background-color: #020617; /* slate-950 */
          overflow: hidden;
        }
        .zen-skeleton-layout {
          display: flex;
          height: 100vh;
          width: 100vw;
          opacity: 0;
          animation: skeleton-fade-in 0.3s ease-out 0.1s forwards;
        }
        .zen-skeleton-sidebar {
          width: 260px;
          height: 100%;
          border-right: 1px solid rgba(255, 255, 255, 0.1);
          background: rgba(0, 0, 0, 0.2);
          display: flex;
          flex-direction: column;
          padding: 24px;
          box-sizing: border-box;
          flex-shrink: 0;
        }
        @media (max-width: 768px) {
          .zen-skeleton-sidebar {
            display: none;
          }
        }
        .zen-skeleton-logo {
          width: 140px;
          height: 28px;
          background: rgba(255, 255, 255, 0.05);
          border-radius: 8px;
          margin-top: 8px;
          margin-bottom: 48px;
        }
        .zen-skeleton-nav-item {
          width: 100%;
          height: 40px;
          background: rgba(255, 255, 255, 0.03);
          border-radius: 12px;
          margin-bottom: 8px;
        }
        .zen-skeleton-main {
          flex: 1;
          display: flex;
          flex-direction: column;
        }
        .zen-skeleton-header {
          height: 80px;
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: flex-end;
          padding: 0 32px;
          box-sizing: border-box;
        }
        .zen-skeleton-avatar {
          width: 32px;
          height: 32px;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.05);
        }
        .zen-skeleton-content {
          padding: 24px;
          flex: 1;
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 24px;
          align-content: start;
        }
        .zen-skeleton-card {
          height: 220px;
          background: rgba(0, 0, 0, 0.2);
          border: 1px solid rgba(255, 255, 255, 0.05);
          border-radius: 24px;
        }
        .zen-skeleton-card.large {
          height: 340px;
          grid-column: 1 / -1;
        }
        @keyframes skeleton-fade-in {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes subtle-pulse {
          0%, 100% { opacity: 0.6; }
          50% { opacity: 0.3; }
        }
        .zen-skeleton-pulse {
          animation: subtle-pulse 3s ease-in-out infinite;
        }
      </style>
      <div class="zen-skeleton-layout">
        <div class="zen-skeleton-sidebar">
          <div class="zen-skeleton-logo zen-skeleton-pulse"></div>
          <div class="zen-skeleton-nav-item zen-skeleton-pulse" style="margin-bottom: 32px; height: 48px;"></div>
          <div class="zen-skeleton-nav-item zen-skeleton-pulse"></div>
          <div class="zen-skeleton-nav-item zen-skeleton-pulse"></div>
          <div class="zen-skeleton-nav-item zen-skeleton-pulse"></div>
        </div>
        <div class="zen-skeleton-main">
          <div class="zen-skeleton-header">
             <div class="zen-skeleton-avatar zen-skeleton-pulse"></div>
          </div>
          <div class="zen-skeleton-content">
             <div class="zen-skeleton-card large zen-skeleton-pulse"></div>
             <div class="zen-skeleton-card zen-skeleton-pulse"></div>
             <div class="zen-skeleton-card zen-skeleton-pulse"></div>
             <div class="zen-skeleton-card zen-skeleton-pulse"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
